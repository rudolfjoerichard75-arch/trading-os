<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART MONEY AI TERMINAL</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#050816;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:15px;
}

.card{
    background:#111a33;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#3b82f6,#22c55e);
    color:white;
    font-weight:bold;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    background:#1f2937;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="card">
<h2>👑 SMART MONEY AI TERMINAL</h2>
<p>All-in-One Live Signal + News + TP/SL Engine</p>
</div>

<!-- CHART -->
<div class="card">
<h3>📈 LIVE XAUUSD</h3>

<div id="tv"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width":"100%",
  "height":320,
  "symbol":"OANDA:XAUUSD",
  "interval":"15",
  "theme":"dark",
  "style":"1",
  "container_id":"tv"
});
</script>

</div>

<!-- ANALYSIS -->
<div class="card">
<h3>🧠 AI MARKET ANALYSIS</h3>

<button onclick="analyze()">RUN FULL SCAN</button>

<div id="out" style="margin-top:12px;">Waiting...</div>
</div>

</div>

<script>

// 📰 NEWS (SIMULATED - READY FOR API UPGRADE)
function newsBias(){
    let r = Math.random();

    if(r > 0.65) return {text:"USD STRONG (GOLD WEAK 📉)", bias:-1};
    if(r < 0.35) return {text:"USD WEAK (GOLD STRONG 📈)", bias:1};
    return {text:"NO MAJOR NEWS ➡️", bias:0};
}

// 📊 MARKET STRUCTURE (SMC SIM)
function structure(){

    let r = Math.random();

    if(r > 0.6){
        return {text:"BULLISH STRUCTURE (HH / HL)", bias:1};
    }
    if(r < 0.4){
        return {text:"BEARISH STRUCTURE (LH / LL)", bias:-1};
    }
    return {text:"RANGE / CHOP MARKET", bias:0};
}

// 🧠 ENGINE
function analyze(){

    let news = newsBias();
    let str = structure();

    let score = 50;
    let signal = "";
    let tp = "";
    let sl = "";

    // STRUCTURE IMPACT
    score += str.bias * 30;

    // NEWS IMPACT
    score += news.bias * 15;

    // RISK FILTER
    let volatility = Math.random();

    if(volatility > 0.7){
        score -= 10;
    }

    // FINAL DECISION
    if(score >= 75){
        signal = "🔥 HIGH PROBABILITY BUY SETUP";
        tp = "TP: 25–45 pips";
        sl = "SL: 10–15 pips";
    }
    else if(score <= 35){
        signal = "💀 HIGH PROBABILITY SELL SETUP";
        tp = "TP: 25–45 pips";
        sl = "SL: 10–15 pips";
    }
    else{
        signal = "⚠️ NO TRADE ZONE";
        tp = "-";
        sl = "-";
    }

    document.getElementById("out").innerHTML = `
        🧠 Structure: ${str.text}<br><br>
        📰 News: ${news.text}<br><br>

        📊 Score: <b>${score.toFixed(1)}%</b><br><br>

        🎯 Signal: <b>${signal}</b><br>
        ${tp}<br>
        ${sl}<br><br>

        <span class="badge">SMART MONEY AI ACTIVE</span>
    `;
}

</script>

</body>
</html>
