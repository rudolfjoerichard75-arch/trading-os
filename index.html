<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART MONEY AI TERMINAL PRO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

body{
    margin:0;
    font-family: Inter;
    background: radial-gradient(circle at top,#0b1220,#050816);
    color:#e5e7eb;
}

/* layout */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap:15px;
}

/* cards */
.card{
    background: rgba(17, 24, 51, 0.7);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* header */
.header{
    grid-column: 1 / -1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
}

.title{
    font-size:22px;
    font-weight:800;
    background: linear-gradient(90deg,#3b82f6,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(90deg,#3b82f6,#22c55e);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

/* signal box */
.signal{
    font-size:16px;
    line-height:1.6;
}

/* badge */
.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    background:#1f2937;
    margin-top:8px;
    font-size:12px;
}

/* mobile */
@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="card header">
    <div class="title">👑 SMART MONEY AI TERMINAL PRO</div>
    <div class="badge">LIVE XAUUSD SYSTEM</div>
</div>

<!-- CHART -->
<div class="card">
    <h3>📈 Live Market</h3>
    <div id="tv"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
      "width":"100%",
      "height":420,
      "symbol":"OANDA:XAUUSD",
      "interval":"15",
      "theme":"dark",
      "style":"1",
      "container_id":"tv"
    });
    </script>
</div>

<!-- SIGNAL PANEL -->
<div class="card">
    <h3>🧠 AI Signal Engine</h3>

    <button onclick="run()">ANALYZE MARKET</button>

    <div id="out" class="signal" style="margin-top:15px;">
        Waiting for scan...
    </div>
</div>

</div>

<script>

// 📰 NEWS
function newsBias(){
    let r = Math.random();
    if(r > 0.65) return {text:"USD STRONG 📉", bias:-1};
    if(r < 0.35) return {text:"USD WEAK 📈", bias:1};
    return {text:"NEUTRAL", bias:0};
}

// 📊 STRUCTURE
function structure(){
    let r = Math.random();
    if(r > 0.6) return {text:"BULLISH HH/HL", bias:1};
    if(r < 0.4) return {text:"BEARISH LH/LL", bias:-1};
    return {text:"RANGE MARKET", bias:0};
}

// 🧠 ENGINE
function run(){

    let n = newsBias();
    let s = structure();

    let score = 50;
    score += s.bias * 30;
    score += n.bias * 20;

    let signal = "";
    let tp = "";
    let sl = "";

    if(score >= 75){
        signal = "🔥 HIGH PROBABILITY BUY SETUP";
        tp = "TP: 25–45 pips";
        sl = "SL: 10–15 pips";
    }
    else if(score <= 35){
        signal = "💀 HIGH PROBABILITY SELL SETUP";
        tp = "TP: 25–45 pips";
        sl = "SL: 10–15 pips";
    }
    else{
        signal = "⚠️ NO TRADE ZONE";
        tp = "-";
        sl = "-";
    }

    document.getElementById("out").innerHTML = `
        🧠 Structure: ${s.text}<br><br>
        📰 News: ${n.text}<br><br>

        📊 Score: <b>${score.toFixed(1)}%</b><br><br>

        🎯 Signal: <b>${signal}</b><br>
        ${tp}<br>
        ${sl}<br><br>

        <span class="badge">PRO TERMINAL ACTIVE</span>
    `;
}

</script>

</body>
</html>
