<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bosque Forex Ai</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

/* BASE */
body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#050816;
    color:#e5e7eb;
}

/* TOP BAR */
.topbar{
    height:56px;
    display:flex;
    align-items:center;
    padding:0 18px;
    font-weight:700;
    letter-spacing:0.5px;
    background:rgba(11,18,32,0.9);
    border-bottom:1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
}

/* MAIN LAYOUT */
.layout{
    display:flex;
    height:calc(100vh - 56px);
}

/* CHART */
.left{
    flex:1.6;
    border-right:1px solid rgba(255,255,255,0.06);
}

/* PANEL */
.right{
    flex:0.55;
    padding:18px;
    overflow:auto;
}

/* CARD */
.card{
    background: rgba(17, 24, 51, 0.45);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* TITLE */
h3{
    margin:0 0 8px 0;
    font-size:15px;
    font-weight:700;
    color:#f3f4f6;
}

/* SUB TEXT */
p{
    margin:0;
    font-size:13px;
    opacity:0.7;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    color:white;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    transition:0.2s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 20px rgba(59,130,246,0.15);
}

/* BADGE */
.badge{
    display:inline-block;
    margin-top:10px;
    padding:4px 10px;
    font-size:11px;
    border-radius:999px;
    background:rgba(31,41,55,0.8);
    border:1px solid rgba(255,255,255,0.08);
}

/* SIGNAL STYLES */
.signal{
    margin-top:12px;
    font-size:14px;
    line-height:1.6;
}

.buy{
    color:#22c55e;
    font-weight:700;
}

.sell{
    color:#ef4444;
    font-weight:700;
}

.neutral{
    color:#fbbf24;
    font-weight:700;
}

/* MOBILE */
@media(max-width:900px){
    .layout{
        flex-direction:column;
    }
    .left{
        height:55vh;
    }
}

</style>

</head>

<body>

<div class="topbar">
👑 Bosque Forex Ai — Institutional Trading Terminal
</div>

<div class="layout">

<!-- CHART -->
<div class="left">

<div id="tv" style="height:100%;"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width":"100%",
  "height":"100%",
  "symbol":"OANDA:XAUUSD",
  "interval":"15",
  "theme":"dark",
  "style":"1",
  "container_id":"tv"
});
</script>

</div>

<!-- SIGNAL PANEL -->
<div class="right">

<div class="card">
<h3>🧠 AI Signal Engine</h3>
<p>Smart Money Confluence Scanner</p>
</div>

<div class="card">
<button onclick="run()">RUN ANALYSIS</button>

<div id="out" class="signal">
Ready for market scan...
</div>

<div class="badge">LIVE TERMINAL ACTIVE</div>
</div>

</div>

</div>

<script>

function structure(){
    let r = Math.random();
    if(r > 0.6) return {text:"BULLISH STRUCTURE", bias:1};
    if(r < 0.4) return {text:"BEARISH STRUCTURE", bias:-1};
    return {text:"RANGE MARKET", bias:0};
}

function run(){

    let s = structure();

    let score = 50 + (s.bias * 30);

    let output = "";
    let type = "";

    if(score >= 75){
        type = "buy";
        output = "🔥 BUY SETUP CONFIRMED";
    }
    else if(score <= 35){
        type = "sell";
        output = "💀 SELL SETUP CONFIRMED";
    }
    else{
        type = "neutral";
        output = "⚠️ NO TRADE ZONE";
    }

    document.getElementById("out").innerHTML = `
        📊 Structure: ${s.text}<br><br>
        📈 Score: <b>${score}</b><br><br>
        🎯 Signal: <span class="${type}">${output}</span><br>
    `;
}

</script>

</body>
</html>
