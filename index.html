<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading OS AI Coach</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#050816;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:95%;
    max-width:520px;
    padding:15px;
}

.card{
    background:#111a33;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

.ai{
    background:#0b1225;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
    color:#a5b4fc;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>📊 Trading OS</h2>

<input id="pnl" type="number" placeholder="PnL ($)">
<input id="risk" type="number" placeholder="Risk % used">
<input id="note" type="text" placeholder="Trade note">

<button onclick="addTrade()">Add Trade</button>

<div id="ai" class="ai">AI Coach ready...</div>
</div>

<div class="card">
<h3>📈 Stats</h3>
<div id="stats"></div>
<div id="history"></div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("ai_trades") || "[]");

function addTrade(){

    let pnl = +document.getElementById("pnl").value;
    let risk = +document.getElementById("risk").value;
    let note = document.getElementById("note").value;

    data.unshift({pnl,risk,note});

    localStorage.setItem("ai_trades", JSON.stringify(data));

    render();
}

function aiCoach(data){

    let win = data.filter(t => t.pnl > 0).length;
    let total = data.length;

    let winrate = total ? (win/total*100) : 0;

    let streak = 0;
    for(let i=0;i<data.length;i++){
        if(data[i].pnl <= 0) streak++;
        else break;
    }

    if(streak >= 3){
        return "💀 STOP TRADING. Kau loss streak — jangan revenge trade.";
    }

    if(winrate > 60){
        return "🔥 Good job. Kau konsisten — keep executing setup sama.";
    }

    return "🧠 Fokus disiplin dulu, jangan overtrade.";
}

function render(){

    let win = data.filter(t => t.pnl > 0).length;
    let winrate = data.length ? (win/data.length*100).toFixed(1) : 0;

    document.getElementById("stats").innerHTML =
    `Trades: ${data.length} <br> Winrate: ${winrate}%`;

    document.getElementById("ai").innerText = aiCoach(data);

    let html = "";

    data.slice(0,5).forEach(t=>{
        html += `
        <div class="card">
        💰 PnL: ${t.pnl}<br>
        ⚖ Risk: ${t.risk}%<br>
        📝 ${t.note}
        </div>`;
    });

    document.getElementById("history").innerHTML = html;
}

render();

</script>

</body>
</html>
