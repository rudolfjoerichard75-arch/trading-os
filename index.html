<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bosque Forex Ai</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family: system-ui, Arial;
    background:#050816;
    color:#e5e7eb;
}

/* ===== TOP STATUS BAR ===== */
.topbar{
    height:56px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    background:rgba(11,18,32,0.95);
    border-bottom:1px solid rgba(255,255,255,0.06);
    font-size:13px;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#22c55e;
    display:inline-block;
    margin-right:6px;
    animation:blink 1.2s infinite;
}

@keyframes blink{
    50%{opacity:0.3;}
}

/* ===== LAYOUT ===== */
.layout{
    display:flex;
    height:calc(100vh - 56px);
}

/* ===== CHART ===== */
.left{
    flex:1.7;
    border-right:1px solid rgba(255,255,255,0.06);
}

/* ===== RIGHT PANEL ===== */
.right{
    flex:0.6;
    padding:16px;
    overflow:auto;
}

/* ===== CARD SYSTEM ===== */
.card{
    background:rgba(17,24,51,0.45);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:800;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#3b82f6,#22c55e);
}

/* ===== SIGNAL CARDS ===== */
.signal-buy{
    border-left:3px solid #22c55e;
    box-shadow:0 0 20px rgba(34,197,94,0.15);
}

.signal-sell{
    border-left:3px solid #ef4444;
    box-shadow:0 0 20px rgba(239,68,68,0.15);
}

.signal-wait{
    border-left:3px solid #fbbf24;
    box-shadow:0 0 20px rgba(251,191,36,0.10);
}

/* ===== BADGE ===== */
.badge{
    display:inline-block;
    margin-top:10px;
    padding:4px 10px;
    font-size:11px;
    border-radius:999px;
    background:#1f2937;
}

/* ===== TEXT ===== */
h3{margin:0 0 6px 0;font-size:15px;}
p{margin:0;opacity:0.7;font-size:13px;}

/* ===== MOBILE ===== */
@media(max-width:900px){
    .layout{flex-direction:column;}
    .left{height:55vh;}
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div>
<span class="dot"></span>
XAUUSD • LIVE MARKET
</div>

<div>
📊 BOSQUE FOREX AI TERMINAL
</div>

<div>
SESSION: LONDON/NY
</div>

</div>

<div class="layout">

<!-- CHART -->
<div class="left">

<div id="tv" style="height:100%;"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width":"100%",
  "height":"100%",
  "symbol":"OANDA:XAUUSD",
  "interval":"15",
  "theme":"dark",
  "style":"1",
  "container_id":"tv"
});
</script>

</div>

<!-- SIGNAL PANEL -->
<div class="right">

<div class="card">
<h3>🧠 AI Market Engine</h3>
<p>Institutional Smart Money Scanner</p>
</div>

<div class="card">
<button onclick="run()">SCAN MARKET</button>

<div id="out" style="margin-top:12px;">
Waiting for signal...
</div>

<div class="badge">LIVE TERMINAL ACTIVE</div>
</div>

</div>

</div>

<script>

function run(){

    let r = Math.random();

    let structure =
        (r > 0.6) ? "BULLISH STRUCTURE" :
        (r < 0.4) ? "BEARISH STRUCTURE" :
        "RANGE MARKET";

    let score = 50;

    if(structure.includes("BULLISH")) score += 30;
    if(structure.includes("BEARISH")) score -= 30;

    let type = "";
    let signalClass = "";
    let signalText = "";

    let price = 2350 + Math.random()*10;

    if(score >= 70){
        type = "BUY";
        signalClass = "signal-buy";
        signalText = "🔥 BUY SETUP CONFIRMED";
    }
    else if(score <= 40){
        type = "SELL";
        signalClass = "signal-sell";
        signalText = "💀 SELL SETUP CONFIRMED";
    }
    else{
        type = "WAIT";
        signalClass = "signal-wait";
        signalText = "⚠️ NO TRADE ZONE";
    }

    document.getElementById("out").innerHTML = `
        <div class="card ${signalClass}">
            📊 Structure: ${structure}<br><br>
            📈 Score: <b>${score}</b><br><br>
            💰 Price: ${price.toFixed(2)}<br><br>
            🎯 Signal: <b>${signalText}</b><br>
        </div>
    `;
}

</script>

</body>
</html>
